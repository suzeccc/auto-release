# Generated by Project Release Automator
# Template: go-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-windows-amd64.exe
          - os: windows-11-arm
            goos: windows
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-windows-arm64.exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-linux-arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          go build -trimpath -o "release-assets/${{ matrix.asset }}" "{{BUILD_PATH}}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @(Get-ChildItem -LiteralPath release-assets -File | ForEach-Object FullName)
          if ($files.Count -ne 6) { throw "Expected 6 release assets, found $($files.Count)" }
          gh release create $env:GITHUB_REF_NAME @files --draft --title "{{PROJECT_NAME}} $env:GITHUB_REF_NAME" --notes "Automated draft release for $env:GITHUB_REF_NAME."
