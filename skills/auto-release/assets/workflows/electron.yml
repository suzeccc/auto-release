# Generated by Auto Release
# Template: electron-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
{{PACKAGE_MANAGER_SETUP}}
      - name: Install dependencies
        run: {{INSTALL_COMMAND}}
{{TEST_STEP}}
      - name: Build Electron packages
        run: {{ELECTRON_BUILD_COMMAND}}
      - name: Package output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "{{ELECTRON_OUTPUT}}" -PathType Container)) { throw "Electron output directory not found" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "{{ELECTRON_OUTPUT}}/*" -DestinationPath "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
