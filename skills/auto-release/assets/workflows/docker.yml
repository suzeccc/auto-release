# Generated by Auto Release
# Template: docker-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: {{DOCKERFILE}}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          labels: org.opencontainers.image.version=${{ github.ref_name }}
      - name: Write image manifest
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          New-Item -ItemType Directory -Force release-assets | Out-Null
          "${{ steps.image.outputs.name }}:${{ github.ref_name }}@${{ steps.build.outputs.digest }}" | Set-Content -Encoding utf8 "release-assets/{{ARTIFACT_STEM}}-$version-image.txt"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-manifest
          path: release-assets/*-image.txt
          if-no-files-found: error
          retention-days: 1
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*-image.txt
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Published multi-architecture image ${{ steps.image.outputs.name }}:${{ github.ref_name }}."
