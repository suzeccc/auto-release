# Generated by Auto Release
# Template: node-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
{{PACKAGE_MANAGER_SETUP}}
      - name: Install dependencies
        run: {{INSTALL_COMMAND}}
{{TEST_STEP}}
{{BUILD_STEP}}
      - name: Pack package
        run: |
          mkdir -p release-assets
          npm pack --pack-destination release-assets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package
          path: release-assets/*.tgz
          if-no-files-found: error
          retention-days: 1
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.tgz
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
