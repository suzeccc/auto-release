# Generated by Auto Release
# Template: go-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-windows-amd64.exe
          - os: windows-11-arm
            goos: windows
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-windows-arm64.exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-linux-arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            asset: {{ARTIFACT_STEM}}-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset: {{ARTIFACT_STEM}}-darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          go build -trimpath -o "release-assets/${{ matrix.asset }}" "{{BUILD_PATH}}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @(Get-ChildItem -LiteralPath release-assets -File | ForEach-Object FullName)
          if ($files.Count -ne 6) { throw "Expected 6 release assets, found $($files.Count)" }
          gh release create $env:GITHUB_REF_NAME @files --draft --title "{{PROJECT_NAME}} $env:GITHUB_REF_NAME" --notes "Automated draft release for $env:GITHUB_REF_NAME."
