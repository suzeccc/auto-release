# Generated by Auto Release
# Template: android-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6
      - name: Build APK and AAB
        run: |
          chmod +x ./gradlew
          ./gradlew test assembleRelease bundleRelease --no-daemon
      - name: Collect packages
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $apk = @(Get-ChildItem -LiteralPath "{{ANDROID_MODULE}}/build/outputs/apk/release" -Recurse -File -Filter "*.apk")
          $aab = @(Get-ChildItem -LiteralPath "{{ANDROID_MODULE}}/build/outputs/bundle/release" -Recurse -File -Filter "*.aab")
          if ($apk.Count -ne 1 -or $aab.Count -ne 1) { throw "Expected one release APK and one release AAB" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item -LiteralPath $apk[0].FullName -Destination "release-assets/{{ARTIFACT_STEM}}-$version.apk"
          Copy-Item -LiteralPath $aab[0].FullName -Destination "release-assets/{{ARTIFACT_STEM}}-$version.aab"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-packages
          path: release-assets/*
          if-no-files-found: error
          retention-days: 1
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated unsigned release packages for $GITHUB_REF_NAME."
