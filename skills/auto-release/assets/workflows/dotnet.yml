# Generated by Auto Release
# Template: dotnet-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "{{DOTNET_VERSION}}"
      - name: Restore
        run: dotnet restore "{{DOTNET_PROJECT}}"
      - name: Test
        run: dotnet test "{{DOTNET_PROJECT}}" --no-restore --configuration Release
      - name: Pack
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          dotnet pack "{{DOTNET_PROJECT}}" --no-restore --configuration Release -p:PackageVersion=$version --output dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotnet-packages
          path: dist/*.nupkg
          if-no-files-found: error
          retention-days: 1
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*.nupkg
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
