# Generated by Auto Release
# Template: flutter-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android-apk
            command: flutter build apk --release
            source: build/app/outputs/flutter-apk/app-release.apk
            kind: file
          - os: ubuntu-latest
            platform: android-aab
            command: flutter build appbundle --release
            source: build/app/outputs/bundle/release/app-release.aab
            kind: file
          - os: windows-latest
            platform: windows-x64
            command: flutter build windows --release
            source: build/windows/x64/runner/Release
            kind: zip
          - os: ubuntu-latest
            platform: linux-x64
            command: flutter build linux --release
            source: build/linux/x64/release/bundle
            kind: tar
          - os: macos-15-intel
            platform: macos-x64
            command: flutter build macos --release
            source: build/macos/Build/Products/Release
            kind: zip
          - os: macos-latest
            platform: macos-arm64
            command: flutter build macos --release
            source: build/macos/Build/Products/Release
            kind: zip
          - os: ubuntu-latest
            platform: web
            command: flutter build web --release
            source: build/web
            kind: zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        if: startsWith(matrix.platform, 'android-')
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Install dependencies
        run: flutter pub get
      - name: Test
        run: flutter test
      - name: Build
        run: ${{ matrix.command }}
      - name: Package
        shell: pwsh
        run: |
          $source = "${{ matrix.source }}"
          if (-not (Test-Path -LiteralPath $source)) { throw "Flutter output not found: $source" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $extension = if ("${{ matrix.kind }}" -eq "file") { [IO.Path]::GetExtension($source) } elseif ("${{ matrix.kind }}" -eq "tar") { ".tar.gz" } else { ".zip" }
          $asset = "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}$extension"
          if ("${{ matrix.kind }}" -eq "file") { Copy-Item -LiteralPath $source -Destination $asset }
          elseif ("${{ matrix.kind }}" -eq "tar") { tar -czf $asset -C $source . }
          else { Compress-Archive -Path (Join-Path $source "*") -DestinationPath $asset }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
