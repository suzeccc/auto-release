# Generated by Auto Release
# Template: cmake-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            cmakeArgs: -A x64
          - os: windows-11-arm
            platform: windows
            arch: arm64
            cmakeArgs: -A ARM64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            cmakeArgs: ""
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            cmakeArgs: ""
          - os: macos-15-intel
            platform: macos
            arch: x64
            cmakeArgs: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            cmakeArgs: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmakeArgs }}
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Package executable
        shell: pwsh
        run: |
          $candidates = @(Get-ChildItem -LiteralPath build -Recurse -File | Where-Object { $_.Name -in @("{{CMAKE_TARGET}}", "{{CMAKE_TARGET}}.exe") })
          if ($candidates.Count -ne 1) { throw "Expected one {{CMAKE_TARGET}} executable, found $($candidates.Count)" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -LiteralPath $candidates[0].FullName -DestinationPath "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
