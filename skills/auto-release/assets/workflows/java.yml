# Generated by Auto Release
# Template: java-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: {{JAVA_CACHE}}
      - name: Test and package
        run: {{JAVA_BUILD_COMMAND}}
      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-assets
          find {{JAVA_ARTIFACT_DIRECTORY}} -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-plain.jar' -exec cp {} release-assets/ \;
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: java-packages
          path: release-assets/*.jar
          if-no-files-found: error
          retention-days: 1
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.jar
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
